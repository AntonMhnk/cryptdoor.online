name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Download mihomo sidecar
        run: pnpm prebuild:mihomo ${{ matrix.target }}

      - name: Download wintun (Windows only)
        if: matrix.os == 'windows-latest'
        run: pnpm prebuild:wintun ${{ matrix.target }}

      - name: Build frontend (creates dist/ for Tauri)
        run: pnpm build

      - name: Placeholder helper (avoids externalBin chicken-and-egg)
        shell: bash
        run: |
          mkdir -p src-tauri/sidecar
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            : > "src-tauri/sidecar/cryptdoor-helper-${{ matrix.target }}.exe"
          else
            : > "src-tauri/sidecar/cryptdoor-helper-${{ matrix.target }}"
            chmod +x "src-tauri/sidecar/cryptdoor-helper-${{ matrix.target }}"
          fi

      - name: Build helper binary
        run: |
          cd src-tauri
          cargo build --release --bin cryptdoor-helper --target ${{ matrix.target }}
        shell: bash

      - name: Stage helper for externalBin
        run: node scripts/copy-helper.mjs
        env:
          PROFILE: release
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The key was generated with an empty password (--password "").
          # GitHub Secrets disallows empty strings, so we just leave the env
          # variable empty if no secret is provided.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json for updater
        id: meta
        shell: bash
        env:
          # Pass via env so that multiline commit messages don't break the shell.
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="$COMMIT_MSG"
          if [ -z "$NOTES" ]; then
            NOTES="See https://github.com/${REPO}/releases/tag/${GITHUB_REF_NAME}"
          fi

          BASE="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          # Search recursively because actions/upload-artifact preserves
          # source directory structure (e.g. artifacts/macos-arm64/macos/*.tar.gz).
          MAC_ARM_TARBALL=$(find artifacts/macos-arm64 -type f -name '*.app.tar.gz' | head -1 || true)
          MAC_ARM_SIG=$(find artifacts/macos-arm64 -type f -name '*.app.tar.gz.sig' | head -1 || true)
          WIN_NSIS=$(find artifacts/windows-x64 -type f -name '*.exe' ! -name '*.sig' | head -1 || true)
          WIN_SIG=$(find artifacts/windows-x64 -type f -name '*.exe.sig' | head -1 || true)

          if [ -z "$MAC_ARM_TARBALL" ] || [ -z "$WIN_NSIS" ] || [ -z "$MAC_ARM_SIG" ] || [ -z "$WIN_SIG" ]; then
            echo "missing build artifacts" >&2
            echo "MAC_ARM_TARBALL=$MAC_ARM_TARBALL" >&2
            echo "MAC_ARM_SIG=$MAC_ARM_SIG" >&2
            echo "WIN_NSIS=$WIN_NSIS" >&2
            echo "WIN_SIG=$WIN_SIG" >&2
            find artifacts -type f >&2
            exit 1
          fi

          MAC_ARM_TB_NAME=$(basename "$MAC_ARM_TARBALL")
          WIN_NSIS_NAME=$(basename "$WIN_NSIS")

          MAC_SIG_VAL=$(cat "$MAC_ARM_SIG")
          WIN_SIG_VAL=$(cat "$WIN_SIG")

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Use jq to build JSON safely — handles quotes, newlines, and any
          # special characters in NOTES without manual escaping.
          jq -n \
            --arg version "$VERSION" \
            --arg notes   "$NOTES" \
            --arg pub     "$PUB_DATE" \
            --arg mac_sig "$MAC_SIG_VAL" \
            --arg mac_url "${BASE}/${MAC_ARM_TB_NAME}" \
            --arg win_sig "$WIN_SIG_VAL" \
            --arg win_url "${BASE}/${WIN_NSIS_NAME}" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub,
               platforms: {
                 "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                 "windows-x86_64": { signature: $win_sig, url: $win_url }
               }
             }' > artifacts/latest.json

          cat artifacts/latest.json

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.app.tar.gz' -o -name '*.sig' \) \
            -exec cp {} release/ \;
          cp artifacts/latest.json release/latest.json
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
